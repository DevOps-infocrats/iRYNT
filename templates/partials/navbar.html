<script>
    (function () {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);

        const initThemeToggle = () => {
            const themeToggleBtn = document.getElementById('themeToggle');
            if (themeToggleBtn) {
                const icon = themeToggleBtn.querySelector('.material-symbols-outlined');

                const updateThemeIcon = (theme) => {
                    if (icon) {
                        icon.textContent = theme === 'dark' ? 'light_mode' : 'dark_mode';
                    }
                };

                const currentTheme = document.documentElement.getAttribute('data-bs-theme') || 'light';
                updateThemeIcon(currentTheme);

                // Clone to strip any existing listeners and ensure a single clean handler
                const newToggleBtn = themeToggleBtn.cloneNode(true);
                themeToggleBtn.parentNode.replaceChild(newToggleBtn, themeToggleBtn);

                newToggleBtn.addEventListener('click', () => {
                    const targetTheme = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-bs-theme', targetTheme);
                    localStorage.setItem('theme', targetTheme);
                    updateThemeIcon(targetTheme);
                });
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initThemeToggle);
        } else {
            initThemeToggle();
        }
    })();
</script>
