<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Circle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/design-tokens.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/circle.css') }}">
</head>
<body>
    <div class="container py-4">
        <h1>Edit Circle</h1>
        <form method="POST">
            {{ form.hidden_tag() }}
            <div class="mb-3">
                <label class="form-label">Company</label>
                <div class="form-control-plaintext">{{ company.company_name }} ({{ company.company_code }})</div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="{{ form.circle_code.id }}">Circle Code</label>
                {{ form.circle_code(class='form-control') }}
            </div>
            <div class="mb-3">
                <label class="form-label" for="{{ form.circle_name.id }}">Circle Name</label>
                {{ form.circle_name(class='form-control') }}
            </div>
            <div class="mb-3">
                {{ form.submit(class='btn btn-gradient') }}
            </div>
        </form>
    </div>
</body>
</html>
